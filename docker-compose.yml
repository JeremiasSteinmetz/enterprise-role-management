services:
  nginx-proxy:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - ekos-network

  enterprise-role-management:
    build:
      context: ./Ekos.Api
      dockerfile: ./Dockerfile
    networks:
      - ekos-network

  visual-terminal:
    build:
      context: ./infra
      dockerfile: ./dockerfile.terminal
    ports:
      - "8081:8081"
    networks:
      - ekos-network
networks:
  ekos-network:
    driver: bridge

 

